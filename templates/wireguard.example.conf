# Public-safe WireGuard example
# Copy to wg0.conf locally and replace placeholders.
# Never commit real private keys.

[Interface]
Address = 10.50.0.2/24
PrivateKey = CHANGE_ME_CLIENT_PRIVATE_KEY
DNS = 1.1.1.1

[Peer]
PublicKey = CHANGE_ME_SERVER_PUBLIC_KEY
Endpoint = vpn.example.com:51820
AllowedIPs = 10.50.0.0/24
PersistentKeepalive = 25
